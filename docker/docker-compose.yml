services:
  card-classic:
    image: card-classic
    container_name: card-classic
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "3000:3000"
    volumes:
      # Persist the SQLite database independently from the container image.
      # Rebuilding/replacing the image leaves this volume (and all contacts) intact.
      - card-classic-data:/data
    restart: unless-stopped

volumes:
  card-classic-data:
    name: card-classic-data
