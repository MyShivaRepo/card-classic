<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Card Classic</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Card Classic</h1>
  </header>

  <main>
    <!-- Mode liste -->
    <section id="vue-liste">
      <div class="toolbar">
        <button id="btn-ajouter" class="btn btn-green">+ Ajouter</button>
      </div>
      <table id="table-contacts">
        <thead>
          <tr>
            <th data-col="nom">Nom <span class="sort-icon"></span></th>
            <th data-col="prenom">Prénom <span class="sort-icon"></span></th>
            <th data-col="email">E-Mail <span class="sort-icon"></span></th>
            <th data-col="telephone">Téléphone <span class="sort-icon"></span></th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="tbody-contacts"></tbody>
      </table>
      <div class="toolbar toolbar-bottom">
        <button id="btn-export" class="btn btn-yellow">Exporter RDF/OWL</button>
        <button id="btn-export-json" class="btn btn-blue">Exporter JSON</button>
      </div>
    </section>

    <!-- Mode fiche -->
    <section id="vue-fiche" class="hidden">
      <h2 id="fiche-titre">Nouveau contact</h2>
      <form id="form-contact">
        <input type="hidden" id="fiche-id">
        <div class="form-group">
          <label for="fiche-nom">Nom</label>
          <input type="text" id="fiche-nom" required placeholder="Nom">
        </div>
        <div class="form-group">
          <label for="fiche-prenom">Prénom</label>
          <input type="text" id="fiche-prenom" required placeholder="Prénom">
        </div>
        <div class="form-group">
          <label for="fiche-email">E-Mail</label>
          <input type="email" id="fiche-email" placeholder="adresse@exemple.com">
        </div>
        <div class="form-group">
          <label for="fiche-telephone">Téléphone</label>
          <input type="tel" id="fiche-telephone" placeholder="+33 6 00 00 00 00">
        </div>
        <div class="form-actions">
          <button type="button" id="btn-annuler" class="btn btn-gray">Annuler</button>
          <button type="submit" class="btn btn-blue">Valider</button>
        </div>
      </form>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
